[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
# Necessario: _getValues/_tokenTransfer del token reflection generano
# "stack too deep" con la pipeline legacy.
via_ir = true
# Target: BSC (BNB Chain). Shanghai è supportata da BSC dopo l'hard fork
# omonimo; evitiamo opcode Cancun non ancora garantiti su tutti i nodi BSC.
evm_version = "shanghai"

[rpc_endpoints]
bsc = "https://bsc-dataseed.binance.org"
bsc_testnet = "https://data-seed-prebsc-1-s1.binance.org:8545"

[etherscan]
# Chiave unica Etherscan V2 (vale anche per BscScan): https://etherscan.io/apis
bsc = { key = "${ETHERSCAN_API_KEY}", chain = 56 }
bsc_testnet = { key = "${ETHERSCAN_API_KEY}", chain = 97 }
