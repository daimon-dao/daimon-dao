[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
# Necessario: _getValues/_tokenTransfer del token reflection generano
# "stack too deep" con la pipeline legacy.
via_ir = true
# Target: BSC (BNB Chain). Shanghai è supportata da BSC dopo l'hard fork
# omonimo; evitiamo opcode Cancun non ancora garantiti su tutti i nodi BSC.
evm_version = "shanghai"

[rpc_endpoints]
bsc = "https://bsc-dataseed.binance.org"
